# Per-workspace layout rules (native Hyprland 0.54)
# Default layout is dwindle (set in general{})
# Philips ultrawide gets master layout with center orientation
workspace = m[desc:Philips Consumer Electronics Company PHL 499P9], layout:master, layoutopt:orientation:center

# Bind scratchpad special workspaces to ultrawide
# Workaround for Hyprland 0.54 regression: cross-monitor movetoworkspacesilent
# recalculates floating window position instead of preserving it.
# Without this, special workspaces end up on eDP-1 and every toggle causes
# a cross-monitor move that breaks positioning.
# When undocked (no DP-3), these rules are ignored — scratchpads work on eDP-1.
workspace = special:slack, monitor:DP-3
workspace = special:whatsapp, monitor:DP-3
workspace = special:ytmusic, monitor:DP-3
workspace = special:spotify, monitor:DP-3
workspace = special:1password, monitor:DP-3
workspace = special:volume, monitor:DP-3
workspace = special:easyeffects, monitor:DP-3
workspace = special:openwebui, monitor:DP-3
workspace = special:claude, monitor:DP-3
workspace = special:obsidian, monitor:DP-3
workspace = special:reclaim, monitor:DP-3
workspace = special:todoist, monitor:DP-3
workspace = special:linear, monitor:DP-3
workspace = special:top, monitor:DP-3
workspace = special:nvtop, monitor:DP-3
workspace = special:dropterm, monitor:DP-3
workspace = special:protonmail, monitor:DP-3
